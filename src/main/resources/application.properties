# ==========================================
# CONFIGURACI”N GENERAL DE LA APP
# ==========================================
spring.application.name=GoDreamAPI
server.port=8080

# ==========================================
# BASE DE DATOS (H2 en memoria para desarrollo)
# ==========================================
# La base de datos se crea autom·ticamente al iniciar y se llama 'godreamdb'
spring.datasource.url=jdbc:h2:mem:godreamdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 para ver los leads en el navegador (localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ==========================================
# JPA / HIBERNATE
# ==========================================
# 'update' crea o modifica las tablas autom·ticamente seg˙n tus clases Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Evita errores al mostrar la consola H2 dentro de un frame
spring.headers.frame-options=sameorigin

# ==========================================
# CONFIGURACI”N DE CORREO (SMTP GMAIL)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# REEMPLAZA CON TU CORREO REAL
spring.mail.username=juliand.martinez12@gmail.com
# REEMPLAZA CON TU CONTRASE—A DE APLICACI”N DE 16 DÕGITOS
spring.mail.password=pgbs dfno cimw xhhp

# Propiedades de seguridad obligatorias para Gmail
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# LOGGING (Para ver quÈ pasa en la consola)
# ==========================================
logging.level.org.springframework.web=INFO
logging.level.com.godream.api=DEBUG