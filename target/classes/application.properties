# ==========================================
# CONFIGURACIï¿½N GENERAL DE LA APP
# ==========================================
spring.application.name=GoDreamAPI
# Render/Railway asignan el puerto automï¿½ticamente a travï¿½s de la variable PORT
server.port=${PORT:8080}

# Datos de conexiï¿½n dinï¿½micos (Se configuran en el panel del servidor)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Driver para PostgreSQL (Recomendado para Render/Railway)
# Si decides usar MySQL, cambia a: com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialecto para PostgreSQL (Cambia a MySQL8Dialect si usas MySQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Desactivamos la consola H2 en producciï¿½n por seguridad y porque usaremos una DB real
spring.h2.console.enabled=false

# ==========================================
# CONFIGURACIï¿½N DE CORREO (SMTP GMAIL)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=juliand.martinez12@gmail.com
# Mantï¿½n esta clave segura; en producciï¿½n es mejor usar una variable: ${MAIL_PASSWORD}
spring.mail.password=pgbs dfno cimw xhhp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
